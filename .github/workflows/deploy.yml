name: Trigger Render ML Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ml-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-ml:
    name: "🐍 Trigger ML Redeploy → Render"
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
            echo "✅ Render deploy triggered (HTTP $RESPONSE)"
          else
            echo "⚠️ Render deploy hook returned HTTP $RESPONSE"
            echo "Check RENDER_DEPLOY_HOOK_URL secret is correct"
            exit 1
          fi

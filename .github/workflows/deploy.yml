name: Deploy — Vercel + Render

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_ml:
        description: "Also trigger ML service redeploy on Render?"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false   # Never cancel an in-flight deploy

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  # ─── Job 1: Deploy Next.js → Vercel ──────────────────────────────────────────
  deploy-web:
    name: "🚀 Deploy Next.js → Vercel"
    runs-on: ubuntu-latest
    outputs:
      url: ${{ steps.vercel-deploy.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npm run type-check

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          ML_SERVICE_URL: ${{ secrets.ML_SERVICE_URL }}
          ML_SERVICE_SECRET: ${{ secrets.ML_SERVICE_SECRET }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Deploy to Vercel Production
        id: vercel-deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"

      - name: Comment deploy URL on PR (if PR)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `🚀 **Preview deployed!**\n\n🌐 URL: ${{ steps.vercel-deploy.outputs.url }}`
            })

  # ─── Job 2: Trigger Render ML Redeploy ────────────────────────────────────────
  deploy-ml:
    name: "🐍 Trigger ML Redeploy → Render"
    runs-on: ubuntu-latest
    needs: deploy-web
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ml == 'true')
    steps:
      - name: Trigger Render deploy hook
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          if [ "$RESPONSE" = "200" ] || [ "$RESPONSE" = "201" ]; then
            echo "✅ Render deploy triggered (HTTP $RESPONSE)"
          else
            echo "⚠️ Render deploy hook returned HTTP $RESPONSE"
            echo "Check RENDER_DEPLOY_HOOK_URL secret is correct"
            exit 1
          fi

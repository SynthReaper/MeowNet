# python-ml/docker-compose.yml
# MeowNet ML Service — Local Development
# Usage: cd python-ml && docker-compose up

version: '3.9'

services:
  meownet-ml:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meownet-ml
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - ML_SERVICE_SECRET=${ML_SERVICE_SECRET:-dev_local_secret}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      - HF_API_TOKEN=${HF_API_TOKEN:-}
    volumes:
      # Hot-reload for local development: mount source, exclude venv
      - .:/app
      - /app/__pycache__
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

# To override env vars locally, create python-ml/.env:
#   ML_SERVICE_SECRET=your_secret
#   HF_API_TOKEN=hf_...
